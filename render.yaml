services:
  - type: web
    name: mayor-email-backend
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: INTERNAL_API_KEY
        sync: false
      - key: HUBSPOT_TOKEN
        sync: false
      - key: HUBSPOT_CLIENT_SECRET
        sync: false
      - key: HUBSPOT_ORDER_DEAL_STAGE
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_REPLY_TO
        sync: false
      - key: BRAND_ACCENT_COLOR
        value: "#1a1a1a"
      - key: BRAND_NAME
        value: Mayor Clothing
      - key: BRAND_LOGO_URL
        sync: false
      - key: GMAIL_PUBSUB_TOPIC
        sync: false
      - key: LEUCROCOTTA_WEBHOOK_SECRET
        sync: false

  # Hourly safety-net poll: reconciles HubSpot trigger flags via /hermes/poll.
  # Curls the web service so all HubSpot/Google secrets stay there — the cron
  # only needs the API key. Host is hardcoded: the fromService host wiring
  # resolved unreachably (curl exit 7); the public URL is stable, so use it.
  - type: cron
    name: hermes-poll
    runtime: node
    plan: starter
    schedule: "0 * * * *"
    buildCommand: "true"
    startCommand: 'curl -fsS -X POST "https://mayor-email-backend.onrender.com/hermes/poll" -H "Authorization: Bearer $INTERNAL_API_KEY"'
    envVars:
      - key: INTERNAL_API_KEY
        sync: false

  # Leucrocotta watch renewal: Gmail push (see /leucrocotta/gmail-webhook)
  # drives the actual inbox check now. The watch() subscription expires
  # after 7 days max, so renew every 6 days to keep it alive.
  - type: cron
    name: leucrocotta-watch-renew
    runtime: node
    plan: starter
    schedule: "0 3 */6 * *"
    buildCommand: "true"
    startCommand: 'curl -fsS -X POST "https://mayor-email-backend.onrender.com/leucrocotta/watch" -H "Authorization: Bearer $INTERNAL_API_KEY"'
    envVars:
      - key: INTERNAL_API_KEY
        sync: false
